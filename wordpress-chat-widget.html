<!-- Add to WordPress: Appearance > Theme File Editor > footer.php, or use "Insert Headers and Footers" plugin -->
<!-- Replace CHAT_URL with your deployed chat URL, e.g. https://your-app.vercel.app/chat -->

<button id="chat-widget-icon" type="button" aria-label="Open chat">
  <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
</button>
<div id="chat-widget-window" style="display:none">
  <div id="chat-widget-overlay"></div>
  <div id="chat-widget-frame-wrap">
    <iframe id="chat-widget-iframe" src="" title="Chat"></iframe>
    <button id="chat-widget-close" type="button" aria-label="Close chat">×</button>
  </div>
</div>

<style>
@keyframes chat-widget-pulse {
  0%, 100% { box-shadow: 0 4px 20px rgba(200,16,46,0.35); transform: scale(1); }
  50% { box-shadow: 0 6px 28px rgba(200,16,46,0.5); transform: scale(1.02); }
}
#chat-widget-icon {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 58px;
  height: 58px;
  background: linear-gradient(135deg, #C8102E, #A50E25);
  color: white;
  border: none;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  z-index: 999998;
  animation: chat-widget-pulse 2.5s ease-in-out infinite;
  transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease, background 0.3s ease;
}
#chat-widget-icon:hover {
  transform: scale(1.08);
  box-shadow: 0 8px 32px rgba(200,16,46,0.55);
  animation: none;
  background: linear-gradient(135deg, #A50E25, #8B0C1F);
}
#chat-widget-icon:active {
  transform: scale(0.98);
  transition-duration: 0.1s;
}
#chat-widget-window { position: fixed; inset: 0; z-index: 999999; }
#chat-widget-overlay {
  position: absolute; inset: 0;
  background: rgba(0,0,0,0);
  cursor: pointer;
  transition: background 0.3s ease;
}
#chat-widget-window[data-open="true"] #chat-widget-overlay {
  background: rgba(0,0,0,0.4);
}
#chat-widget-frame-wrap {
  position: absolute;
  bottom: 24px;
  right: 24px;
  width: 420px;
  height: 600px;
  background: white;
  border-radius: 16px;
  box-shadow: 0 12px 48px rgba(0,0,0,0.15);
  overflow: hidden;
  opacity: 0;
  transform: scale(0.9) translateY(20px);
  transition: opacity 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1), box-shadow 0.3s ease;
}
#chat-widget-window[data-open="true"] #chat-widget-frame-wrap {
  opacity: 1;
  transform: scale(1) translateY(0);
  box-shadow: 0 20px 60px rgba(0,0,0,0.2);
}
#chat-widget-close {
  position: absolute;
  top: 12px;
  right: 12px;
  width: 32px;
  height: 32px;
  border: none;
  background: rgba(255,255,255,0.95);
  color: #C8102E;
  border-radius: 50%;
  font-size: 20px;
  font-weight: bold;
  cursor: pointer;
  z-index: 10;
  line-height: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 2px 8px rgba(0,0,0,0.15);
  transition: transform 0.2s ease, background 0.2s ease;
}
#chat-widget-close:hover {
  background: white;
  transform: scale(1.05);
}
#chat-widget-iframe {
  width: 100%;
  height: 100%;
  border: none;
}
@media (max-width: 480px) {
  #chat-widget-frame-wrap { width: calc(100vw - 32px); right: 16px; left: 16px; height: 70vh; }
}
</style>

<script>
(function() {
  var CHAT_URL = 'https://mcp-chatbot-pied.vercel.app/chat';
  var icon = document.getElementById('chat-widget-icon');
  var win = document.getElementById('chat-widget-window');
  var overlay = document.getElementById('chat-widget-overlay');
  var iframe = document.getElementById('chat-widget-iframe');
  var closeBtn = document.getElementById('chat-widget-close');

  function openChat() {
    iframe.src = CHAT_URL;
    win.style.display = 'block';
    win.style.visibility = 'hidden';
    requestAnimationFrame(function() {
      win.style.visibility = 'visible';
      win.setAttribute('data-open', 'true');
    });
  }
  function closeChat() {
    win.setAttribute('data-open', 'false');
    setTimeout(function() { win.style.display = 'none'; }, 300);
  }

  icon && icon.addEventListener('click', openChat);
  overlay && overlay.addEventListener('click', closeChat);
  closeBtn && closeBtn.addEventListener('click', closeChat);
})();
</script>
